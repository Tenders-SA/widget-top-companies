<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Companies Widget Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; padding: 40px 20px; }
    .demo-grid { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .demo-section h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin-bottom: 12px; }
    @media (max-width: 640px) { .demo-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="demo-grid">
    <div class="demo-section">
      <h2>Light Theme</h2>
      <div data-tendersa-top-companies data-limit="5" data-province="all" data-category="all" data-theme="light"></div>
    </div>
    <div class="demo-section">
      <h2>Dark Theme</h2>
      <div data-tendersa-top-companies data-limit="5" data-province="all" data-category="all" data-theme="dark"></div>
    </div>
  </div>
  <script src="dist/widget-top-companies.js"></script>
</body>
</html>
